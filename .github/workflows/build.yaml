name: Build and Deploy Installers

on:
  push:
    branches: [ "main" ]

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ant fakeroot dpkg-dev

      - name: Build .deb
        working-directory: StickyNotesApp/NativeApplication
        run: ant debian

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: StickyNotesApp/NativeApplication/dist/*.deb

  build-windows:
    name: Build Windows .msi
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Install Ant
        run: |
          Invoke-WebRequest -Uri "https://downloads.apache.org/ant/binaries/apache-ant-1.10.15-bin.zip" -OutFile ant.zip
          Expand-Archive ant.zip -DestinationPath C:\ant
          echo "C:\ant\apache-ant-1.10.15\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build .msi
        working-directory: StickyNotesApp/NativeApplication
        run: ant windows

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: StickyNotesApp/NativeApplication/dist/*.msi

  deploy:
    name: Deploy to docs/
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: downloaded

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: downloaded

      - name: Copy installers to docs
        run: |
          cp downloaded/*.deb docs/QuickNotes-Linux.deb
          cp downloaded/*.msi docs/QuickNotes-Windows.msi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/QuickNotes-Linux.deb docs/QuickNotes-Windows.msi
          git diff --cached --quiet || git commit -m "CI: update installers [skip ci]"
          git push
